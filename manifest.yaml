# apiVersion: v1
# kind: Secret
# metadata:
#   name: mysql-secret
#   namespace: roboshop
# type: Opaque
# data:
#   MYSQL_ROOT_PASSWORD: Um9ib1Nob3BAMQ==
# ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  replicas: 1
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mysql
    spec:
      serviceAccount: mysql-secret-reader
      initContainers:
        - name: secret-reader
          image: amazon/aws-cli
          command: 
          - sh
          - -c
          - |
              $ aws secretsmanager get-secret-value   
              --secret-id arn:aws:secretsmanager:us-east-1:971126626665:secret:/roboshop/dev/mysql_root_password-nVMqWa   
              --query SecretString   --output text | jq -r .MYSQL_ROOT_PASSWORD > /secrets/mysql-secret-reader.txt
              echo "secret placed sucessfully"
              cat /secrets/mysql-secret-reader.txt #just for verification, not kept in prod
          volumeMounts:
          - name: mysql-secret
            mountPath: /secrets
      containers:
      - name: mysql
        image: manohari07/mysql:1.4.0
        volumeMounts:
        - name: mysql-secret
          mountPath: /secrets
      volumes:
      - name: mysql-secret
        emptyDir: {}